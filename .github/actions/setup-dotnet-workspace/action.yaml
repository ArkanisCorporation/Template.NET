name: Setup .NET Workspace
description: Setup the repository .NET SDK, NuGet cache, local tools, and locked restore.

inputs:
  restore-tools:
    description: Restore local .NET tools from dotnet-tools.json.
    required: false
    default: "true"
  restore-dependencies:
    description: Restore NuGet dependencies after tool restore.
    required: false
    default: "true"
  restore-solution:
    description: Legacy alias for callers that skip dependency restore.
    required: false
    default: "true"
  restore-command:
    description: Restore command to run when restore-dependencies is true.
    required: false
    default: dotnet restore Template.slnx --locked-mode

outputs:
  dotnet-version:
    description: The .NET SDK version selected by actions/setup-dotnet.
    value: ${{ steps.setup-dotnet.outputs.dotnet-version }}
  cache-hit:
    description: Whether the NuGet cache restored an exact match.
    value: ${{ steps.nuget-cache.outputs.cache-hit }}

runs:
  using: composite
  steps:
    - name: Setup .NET
      id: setup-dotnet
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: Cache NuGet packages
      id: nuget-cache
      # Pin RunsOn cache because release workflows execute this composite with write permissions.
      uses: runs-on/cache@88d90644011a3a9957fd141a106f5a94f9794203
      with:
        path: ${{ env.NUGET_PACKAGES }}
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json', 'dotnet-tools.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-

    - name: Print .NET and cache details
      shell: bash
      run: |
        echo "Using .NET ${{ steps.setup-dotnet.outputs.dotnet-version }}"
        echo "Cache hit - ${{ steps.nuget-cache.outputs.cache-hit || 'false' }}"

    - name: Restore local .NET tools
      if: inputs.restore-tools == 'true'
      shell: bash
      run: dotnet tool restore || (echo "First tool restore failed; retrying" && dotnet tool restore)

    - name: Restore dependencies
      if: inputs.restore-dependencies == 'true' && inputs.restore-solution == 'true'
      shell: bash
      run: ${{ inputs.restore-command }}
