name: Test & Release (.NET)

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: "Force deploy to Staging?"
        type: boolean
      runner:
        description: "Runner pool (override to ubuntu-latest if self-hosted is broken)"
        type: choice
        options:
          - arkanis-runners
          - ubuntu-latest
        default: arkanis-runners

  # You can use the GitHub API to trigger a webhook event called repository_dispatch
  # when you want to trigger a workflow for activity that happens outside of GitHub.
  repository_dispatch:

  push:
    branches: [ main, release/*, ci ]

  pull_request:
    branches: [ main ]

env:
  # Store NuGet packages in the workspace so the cache stays focused on restored dependencies.
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  test:
    name: Tests
    permissions:
      contents: read
    uses: ./.github/workflows/_test.yaml
    with:
      runner: ${{ github.event_name == 'pull_request' && 'ubuntu-latest' || inputs.runner || 'arkanis-runners' }}

  release-dry-run:
    name: Release Dry Run
    if: ${{ github.event_name == 'pull_request' }}
    needs: test
    permissions:
      contents: read
    uses: ./.github/workflows/_release.yaml
    with:
      dry_run: true
      runner: ubuntu-latest

  release:
    name: Release
    if: ${{ github.event_name != 'pull_request' }}
    needs: test
    permissions:
      contents: write
      issues: write
      pull-requests: write
      packages: write
    uses: ./.github/workflows/_release.yaml
    secrets:
      PR_AUTOMATION_PAT: ${{ secrets.PR_AUTOMATION_PAT }}
      NUGET_PUBLISH_API_KEY: ${{ secrets.NUGET_PUBLISH_API_KEY }}
    with:
      dry_run: ${{ github.ref == 'refs/heads/ci' }}
      runner: ${{ inputs.runner || 'arkanis-runners' }}

  deploy-staging-kubernetes:
    name: Kubernetes
    if: ${{ github.event_name != 'pull_request' && ((github.ref_name == github.event.repository.default_branch && needs.release.outputs.new_version != '') || inputs.deploy_staging) }}
    needs: release
    uses: ./.github/workflows/_deploy-kubernetes.yaml
    with:
      environment_name: staging
      aspire_environment: Kubernetes-Staging
      kubernetes_namespace: citizenid-staging
      image_tag: ${{ needs.release.outputs.new_tag }}
