name: .NET Release

concurrency:
  group: "release-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: write       # for publishing a GitHub release and creating release backpropagation PRs
  issues: write         # for commenting on released issues
  pull-requests: write  # for commenting on released pull requests and creating release backpropagation PRs
  packages: write       # for publishing packages in repository registry

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run?"
        type: boolean
        default: true
      runner:
        description: "Runner pool (override to ubuntu-latest if self-hosted is broken)"
        type: choice
        options:
          - arkanis-runners
          - ubuntu-latest
        default: arkanis-runners
  workflow_call:
    inputs:
      dry_run:
        description: "Dry run?"
        required: false
        type: boolean
        default: false
      runner:
        description: "Runner pool"
        required: false
        type: string
        default: arkanis-runners
      kubectl_version:
        description: "kubectl version"
        required: false
        type: string
        default: v1.36.1
      helm_version:
        description: "Helm version"
        required: false
        type: string
        default: v3.21.0
    secrets:
      PR_AUTOMATION_PAT:
        required: false
        description: "Fine-scoped token used only to approve automated release backpropagation PRs."
      NUGET_PUBLISH_API_KEY:
        required: false
        description: "API key used only when publishing packages to NuGet.org."
    outputs:
      new_version:
        description: "Newly published version"
        value: ${{ jobs.release.outputs.new_version }}
      new_tag:
        description: "New tag"
        value: ${{ jobs.release.outputs.new_tag }}
      last_version:
        description: "Previously published version"
        value: ${{ jobs.release.outputs.last_version }}
      last_tag:
        description: "Previous version tag"
        value: ${{ jobs.release.outputs.last_tag }}

env:
  # Store NuGet packages in the workspace so the cache stays focused on restored dependencies.
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    env:
      HAS_PR_AUTOMATION_PAT: ${{ secrets.PR_AUTOMATION_PAT != '' }}
      KUBECTL_VERSION: ${{ inputs.kubectl_version || 'v1.36.1' }}
      HELM_VERSION: ${{ inputs.helm_version || 'v3.21.0' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET workspace
        id: dotnet
        uses: ./.github/actions/setup-dotnet-workspace

      - name: Set up Docker Buildx (remote BuildKit — self-hosted only)
        uses: docker/setup-buildx-action@v4
        if: inputs.runner == 'arkanis-runners'
        with:
          driver: remote
          endpoint: tcp://buildkitd.buildkit.svc.cluster.local:1234

      - uses: actions/setup-node@v6
        if: inputs.runner == 'arkanis-runners'
        with:
          node-version: 'lts/*'

      - name: Set up Docker Buildx (default — fallback runner)
        uses: docker/setup-buildx-action@v4
        if: inputs.runner != 'arkanis-runners'

      - name: Login to GitHub Container Registry
        if: ${{ !inputs.dry_run }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: true

      - uses: azure/setup-kubectl@v5.1.0
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - uses: azure/setup-helm@v5.0.0
        with:
          version: ${{ env.HELM_VERSION }}

      # determines whether a new version release is mandated
      # if it is, publish scripts are run and new version is tagged and published
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6.0.0
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NUGET_PUBLISH_API_KEY: ${{ secrets.NUGET_PUBLISH_API_KEY }}
          DEBUG: ${{ inputs.dry_run && '*' || '' }}
        with:
          ci: ${{ ! inputs.dry_run }}
          dry_run: ${{ inputs.dry_run }}
          semantic_version: 25.0.2
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/exec@7.0.3

      - run: echo "New release - ${{ steps.semantic-release.outputs.new_release_version || 'no new release' }}"

      - name: Release summary
        run: |
          {
            echo "## Release summary"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Dry run | \`${{ inputs.dry_run }}\` |"
            echo "| New version | \`${{ steps.semantic-release.outputs.new_release_version || 'no new release' }}\` |"
            echo "| New tag | \`${{ steps.semantic-release.outputs.new_release_git_tag || 'no new release' }}\` |"
            echo "| Previous version | \`${{ steps.semantic-release.outputs.last_release_version || 'unknown' }}\` |"
            echo "| Previous tag | \`${{ steps.semantic-release.outputs.last_release_git_tag || 'unknown' }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install GitHub CLI
        if: ${{ ! inputs.dry_run && steps.semantic-release.outputs.new_release_version && github.ref == 'refs/heads/release/stable' }}
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq gh

      - name: Setup Version Backpropagation PR
        id: backpropagation-pr
        if: ${{ ! inputs.dry_run && steps.semantic-release.outputs.new_release_version && github.ref == 'refs/heads/release/stable' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr new --base ${{ github.event.repository.default_branch }} --head ${{ github.ref_name }} --title "Backpropagate release version to default branch: ${{ steps.semantic-release.outputs.new_release_version }}" --body "This is an automated post-release action." --label ci --label automated)
          PR_NUMBER=${PR_URL##*/}
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          gh pr merge --merge --auto ${PR_URL}

      - name: Approve Version Backpropagation PR
        if: ${{ ! inputs.dry_run && steps.semantic-release.outputs.new_release_version && github.ref == 'refs/heads/release/stable' && env.HAS_PR_AUTOMATION_PAT == 'true' }}
        env:
          PR_AUTOMATION_PAT: ${{ secrets.PR_AUTOMATION_PAT }}
          PR_NUMBER: ${{ steps.backpropagation-pr.outputs.pr_number }}
        run: |
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: token ${PR_AUTOMATION_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            -d '{"event":"APPROVE"}'

      - name: Report skipped backpropagation approval
        if: ${{ ! inputs.dry_run && steps.semantic-release.outputs.new_release_version && github.ref == 'refs/heads/release/stable' && env.HAS_PR_AUTOMATION_PAT != 'true' }}
        run: |
          echo "PR_AUTOMATION_PAT is not configured; created the backpropagation PR and enabled automerge without auto-approval."
          echo "PR_AUTOMATION_PAT is not configured; auto-approval was skipped." >> "$GITHUB_STEP_SUMMARY"

    outputs:
      new_version: ${{ steps.semantic-release.outputs.new_release_version }}
      new_tag: ${{ steps.semantic-release.outputs.new_release_git_tag }}
      last_version: ${{ steps.semantic-release.outputs.last_release_version }}
      last_tag: ${{ steps.semantic-release.outputs.last_release_git_tag }}
