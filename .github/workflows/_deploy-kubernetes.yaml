name: .NET Deployment (Kubernetes)

concurrency:
  group: "deploy-kubernetes-${{ inputs.environment_name }}"
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

on:
  workflow_call:
    inputs:
      environment_name:
        description: "GitHub environment name that will be deployed to"
        required: true
        type: string
      aspire_environment:
        description: "Aspire environment name used for deployment"
        required: true
        type: string
      kubernetes_namespace:
        description: "Kubernetes namespace that will receive the Helm release"
        required: true
        type: string
      kubectl_version:
        description: "kubectl version used for deployment"
        required: false
        type: string
        default: "v1.36.1"
      helm_version:
        description: "Helm version used for deployment"
        required: false
        type: string
        default: "v4.2.0"
      image_tag:
        description: "Optional image tag override for Kubernetes:Images:Tag"
        required: false
        type: string
        default: ""

env:
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment_name }}
    runs-on: ${{ vars.RUNNER_CLUSTER || 'arkanis-runners' }}
    timeout-minutes: 45
    environment: ${{ inputs.environment_name }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET workspace
        id: dotnet
        uses: ./.github/actions/setup-dotnet-workspace
        with:
          restore-solution: "false"

      - uses: azure/setup-kubectl@v5.1.0
        with:
          version: ${{ inputs.kubectl_version }}

      - uses: azure/setup-helm@v5.0.0
        with:
          version: ${{ inputs.helm_version }}

      - name: Ensure Kubernetes namespace exists
        env:
          KUBERNETES_NAMESPACE: ${{ inputs.kubernetes_namespace }}
        run: |
          if [[ ! "${KUBERNETES_NAMESPACE}" =~ ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$ ]]; then
            echo "Invalid Kubernetes namespace: ${KUBERNETES_NAMESPACE}" >&2
            exit 1
          fi

          kubectl create namespace "${KUBERNETES_NAMESPACE}" --dry-run=client -o yaml > namespace.yaml
          kubectl apply -f namespace.yaml

      - name: Aspire Deploy
        env:
          ASPIRE_ENVIRONMENT: ${{ inputs.aspire_environment }}
          ENVIRONMENT_NAME: ${{ inputs.environment_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          if [[ -n "$IMAGE_TAG" ]]; then
            export Kubernetes__Images__Tag="$IMAGE_TAG"
          fi

          dotnet tool run aspire -- deploy \
            --apphost src/CitizenId.Host.Aspire/CitizenId.Host.Aspire.csproj \
            --output-path "artifacts/k8s/${ENVIRONMENT_NAME}" \
            --environment "${ASPIRE_ENVIRONMENT}" \
            --non-interactive \
            --pipeline-log-level debug \
            --include-exception-details \
            --debug
