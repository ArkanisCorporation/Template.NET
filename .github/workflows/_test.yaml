name: .NET Test

permissions:
  contents: read

concurrency:
  group: "${{ inputs.concurrency_group_prefix }}-${{ github.ref }}"
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner pool"
        required: false
        type: string
        default: arkanis-runners
      test_filter:
        description: "Optional dotnet test filter expression"
        required: false
        type: string
        default: ""
      concurrency_group_prefix:
        description: "Concurrency group prefix"
        required: false
        type: string
        default: test

env:
  # Store NuGet packages in the workspace so the cache stays focused on restored dependencies.
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      -   name: Git checkout
          uses: actions/checkout@v6
          with:
            persist-credentials: false

      -   name: Setup .NET workspace
          id: dotnet
          uses: ./.github/actions/setup-dotnet-workspace

      -   name: Build solution
          run: dotnet build --no-restore

      -   name: Test solution
          if: inputs.test_filter == ''
          run: dotnet test --no-build --verbosity normal --logger "trx;LogFilePrefix=test-results" --results-directory artifacts/test-results

      -   name: Test filtered solution
          if: inputs.test_filter != ''
          env:
            DOTNET_TEST_FILTER: ${{ inputs.test_filter }}
          run: dotnet test --no-build --verbosity normal --logger "trx;LogFilePrefix=test-results" --results-directory artifacts/test-results --filter "$DOTNET_TEST_FILTER"

      -   name: Upload test results
          if: ${{ always() }}
          uses: actions/upload-artifact@v5
          with:
            name: test-results-${{ github.run_id }}-${{ github.run_attempt }}
            path: artifacts/test-results
            if-no-files-found: warn
            retention-days: 14
