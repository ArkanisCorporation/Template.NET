name: .NET Test

permissions:
  contents: read

concurrency:
  group: "${{ inputs.concurrency_group_prefix }}-${{ github.ref }}"
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner pool"
        required: false
        type: string
        default: arkanis-runners
      test_filter:
        description: "Optional dotnet test filter expression"
        required: false
        type: string
        default: ""
      concurrency_group_prefix:
        description: "Concurrency group prefix"
        required: false
        type: string
        default: test

env:
  # Store NuGet packages in the workspace so the cache stays focused on restored dependencies.
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    steps:
      -   name: Git checkout
          uses: actions/checkout@v6

      -   name: Setup .NET workspace
          id: dotnet
          uses: ./.github/actions/setup-dotnet-workspace

      -   name: Build solution
          run: dotnet build --no-restore

      -   name: Test solution
          if: inputs.test_filter == ''
          run: dotnet test --no-build --verbosity normal

      -   name: Test filtered solution
          if: inputs.test_filter != ''
          run: dotnet test --no-build --verbosity normal --filter "${{ inputs.test_filter }}"
